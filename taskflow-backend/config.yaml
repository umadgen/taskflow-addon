name: "Taskflow"
description: "Family household task manager for Home Assistant"
version: "1.6.10"
slug: "taskflow"
url: "https://github.com/umadgen/taskflow-addon"
image: "ghcr.io/umadgen/taskflow-addon/taskflow-{arch}"
init: false

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

startup: application
boot: auto

ingress: true
ingress_port: 8787

ports:
  8787/tcp: 8787

homeassistant_api: true

map:
  - data:rw
  - config:rw

options:
  household_name: "My Home"
  members: []
  pets: []

schema:
  household_name: str
  members:
    - name: str
      tone: "list(rose|peach|amber|mint|sky|lilac)"
      avatar: str?
  pets:
    - name: str
      species: str
      emoji: str?
